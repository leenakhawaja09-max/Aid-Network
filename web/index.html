<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="rapid_aid">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>rapid_aid</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <!-- Chrome DevTools: Flutter web inputs often lack name/id until the engine sets them. -->
  <script>
    (function () {
      var seq = 0;
      function patchInputs() {
        document.querySelectorAll('input[data-semantics-role="text-field"]').forEach(function (el) {
          if (el.getAttribute('name')) return;
          var label = (
            el.getAttribute('aria-label') ||
            el.getAttribute('placeholder') ||
            ''
          ).toLowerCase();
          var name = 'field_' + (++seq);
          if (label.indexOf('email') >= 0) name = 'email';
          else if (label.indexOf('password') >= 0) name = 'password';
          else if (label.indexOf('name') >= 0) name = 'name';
          else if (label.indexOf('message') >= 0) name = 'message';
          else if (label.indexOf('search') >= 0 || label.indexOf('location') >= 0) name = 'search';
          el.setAttribute('name', name);
          if (!el.id) el.setAttribute('id', name);
        });
      }
      new MutationObserver(patchInputs).observe(document.documentElement, {
        childList: true,
        subtree: true,
      });
      window.addEventListener('flutter-first-frame', patchInputs);
    })();
  </script>
</body>
</html>
